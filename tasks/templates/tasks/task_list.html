<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Task List</title>
</head>
<body>
    <h1>Task List</h1>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    {{ task.title }} - {{ task.status }} - {{ task.owner.username }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No tasks found.</p>
    {% endif %}
</body>
</html>
