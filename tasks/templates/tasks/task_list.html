<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Task List</title>
</head>
<body>
    <h1>Task List</h1>

    <p>
    <a href="{% url 'tasks_web:task-create' %}">Create new task</a>
    </p>

    <form method="get">
        <input type="text" name="q" value="{{ query }}" placeholder="Search tasks">
        <button type="submit">Search</button>
    </form>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                     <a href="{% url 'tasks_web:task-detail' task.pk %}">
                        {{ task.title }}
                    </a>
                    - {{ task.status }} - {{ task.owner.username }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No tasks found.</p>
    {% endif %}
</body>
</html>
