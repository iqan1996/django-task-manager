<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Delete Task</title>
</head>
<body>
    <h1>Delete Task</h1>

    <p>Are you sure you want to delete this task?</p>

    <p>
        <strong>{{ task.title }}</strong>
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>

    <p>
        <a href="{% url 'tasks_web:task-detail' task.pk %}">Cancel</a>
    </p>
</body>
</html>
