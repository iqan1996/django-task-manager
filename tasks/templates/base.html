{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Task Manager{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <script src="{% static 'tasks/js/task_search.js' %}"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'tasks_web:task-list' %}">
                Task Manager
            </a>

            <div class="ms-auto d-flex align-items-center gap-3">
                {% if request.user.is_authenticated %}
                    <span class="text-muted">
                        Logged in as <strong>{{ request.user.username }}</strong>
                    </span>

                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-secondary btn-sm">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">
                        Login
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}
        {% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
    </script>
</body>
</html>
